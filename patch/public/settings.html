<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeLLMAPI — настройки роутера</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a2332; --border:#2d3a4f; --text:#e7ecf3; --muted:#8b9cb3; --accent:#82aaff; --ok:#3dd68c; --err:#f07178; }
    body { margin:0; font:14px/1.5 "Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:12px 16px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:5; }
    header a { color:var(--accent); margin-right:14px; text-decoration:none; }
    main { max-width:900px; margin:0 auto; padding:16px 20px 40px; }
    section { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:16px; }
    h2 { margin:0 0 12px; font-size:1rem; color:var(--accent); }
    label { display:block; margin:10px 0 4px; color:var(--muted); font-size:12px; }
    input[type=number], input[type=text] { width:100%; max-width:280px; padding:6px 10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; }
    .row { display:flex; align-items:center; gap:8px; margin:8px 0; }
    button { background:#2d4a7a; color:var(--text); border:1px solid var(--accent); padding:8px 14px; border-radius:6px; cursor:pointer; }
    button.secondary { background:var(--bg); }
    .models { list-style:none; padding:0; margin:0; }
    .models li { display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .models li.broken { opacity:0.85; border-left:3px solid var(--err); padding-left:8px; }
    .rank { font-weight:700; min-width:28px; color:var(--accent); }
    .stats { font-size:12px; color:var(--muted); }
    .badge { font-size:11px; padding:2px 8px; border-radius:999px; }
    .badge.err { background:#3d1a1f; color:var(--err); }
    .badge.ok { background:#1a3d2e; color:var(--ok); }
    #msg { margin-top:12px; color:var(--ok); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/playground">Playground</a>
      <a href="/keys">Keys</a>
      <a href="/fallback">Fallback</a>
      <a href="/analytics">Analytics</a>
      <a href="/analytics/log">Request log</a>
      <strong>Router settings</strong>
    </nav>
  </header>
  <main>
    <section>
      <h2>Режим роутера</h2>
      <div class="row">
        <input type="checkbox" id="useCustomRouting" />
        <label for="useCustomRouting" style="margin:0">Своя логика (рейтинг + ошибки + health-check). Если выкл. — как в оригинальном FreeLLMAPI (bandit/priority).</label>
      </div>
      <div class="row">
        <input type="checkbox" id="retryOnRouterError" />
        <label for="retryOnRouterError" style="margin:0">При ошибке провайдера не отдавать 502 сразу — повторять другую модель (failover).</label>
      </div>
    </section>

    <section>
      <h2>Ошибки и повторы (3.1–3.2)</h2>
      <label>Ошибок подряд на одной модели → пометить «не работает» и пропускать</label>
      <input type="number" id="errorsBeforeDemote" min="1" max="50" />
      <label>Макс. попыток failover на один запрос клиента</label>
      <input type="number" id="maxFailoverAttempts" min="1" max="50" />
    </section>

    <section>
      <h2>Health-check сломанных моделей (3.3)</h2>
      <div class="row">
        <input type="checkbox" id="healthCheckEnabled" />
        <label for="healthCheckEnabled" style="margin:0">Периодически слать «привет» сломанным моделям</label>
      </div>
      <label>Интервал (минут)</label>
      <input type="number" id="healthCheckIntervalMinutes" min="1" max="1440" />
      <label>Текст пробы</label>
      <input type="text" id="healthProbeMessage" />
    </section>

    <section>
      <h2>Рейтинг моделей (3.3–3.5) — выше в списке = чаще выбирается</h2>
      <p class="stats">Статистика из лога за 7 дней + счётчики ошибок. Перетаскивайте кнопками ↑↓.</p>
      <ul class="models" id="modelList"></ul>
    </section>

    <button id="save">Сохранить настройки</button>
    <span id="msg"></span>
  </main>
  <script>
    let modelOrder = [];
    const $ = (id) => document.getElementById(id);

    async function load() {
      const data = await fetch('/api/router-settings').then(r => r.json());
      const s = data.settings;
      $('useCustomRouting').checked = s.useCustomRouting;
      $('retryOnRouterError').checked = s.retryOnRouterError;
      $('errorsBeforeDemote').value = s.errorsBeforeDemote;
      $('maxFailoverAttempts').value = s.maxFailoverAttempts;
      $('healthCheckEnabled').checked = s.healthCheckEnabled;
      $('healthCheckIntervalMinutes').value = s.healthCheckIntervalMinutes;
      $('healthProbeMessage').value = s.healthProbeMessage;
      modelOrder = data.models.map(m => m.modelDbId);
      renderModels(data.models);
    }

    function renderModels(models) {
      const sorted = [...models].sort((a, b) => modelOrder.indexOf(a.modelDbId) - modelOrder.indexOf(b.modelDbId));
      $('modelList').innerHTML = sorted.map((m, i) => `
        <li class="${m.isBroken ? 'broken' : ''}" data-id="${m.modelDbId}">
          <span class="rank">#${i + 1}</span>
          <span>${m.displayName}<br><span class="stats">${m.platform} / ${m.modelId}</span></span>
          <span class="stats">OK ${m.totalSuccess} · ERR ${m.totalErrors} · подряд ${m.consecutiveErrors}</span>
          ${m.isBroken ? '<span class="badge err">не работает</span>' : '<span class="badge ok">ok</span>'}
          <button type="button" class="secondary up">↑</button>
          <button type="button" class="secondary down">↓</button>
        </li>`).join('');
      $('modelList').querySelectorAll('.up').forEach((btn, idx) => {
        btn.onclick = () => move(idx, -1);
      });
      $('modelList').querySelectorAll('.down').forEach((btn, idx) => {
        btn.onclick = () => move(idx, 1);
      });
    }

    function move(idx, dir) {
      const j = idx + dir;
      if (j < 0 || j >= modelOrder.length) return;
      const t = modelOrder[idx];
      modelOrder[idx] = modelOrder[j];
      modelOrder[j] = t;
      load();
    }

    $('save').onclick = async () => {
      const body = {
        settings: {
          useCustomRouting: $('useCustomRouting').checked,
          retryOnRouterError: $('retryOnRouterError').checked,
          errorsBeforeDemote: Number($('errorsBeforeDemote').value),
          maxFailoverAttempts: Number($('maxFailoverAttempts').value),
          healthCheckEnabled: $('healthCheckEnabled').checked,
          healthCheckIntervalMinutes: Number($('healthCheckIntervalMinutes').value),
          healthProbeMessage: $('healthProbeMessage').value,
        },
        modelOrder,
      };
      await fetch('/api/router-settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      $('msg').textContent = 'Сохранено ' + new Date().toLocaleTimeString();
      load();
    };

    load();
  </script>
</body>
</html>
