# FreeLLMAPI — локальный OpenAI-совместимый прокси для Cline / Continue.
# После перезагрузки ПК поднимается автоматически (Docker enabled + restart: unless-stopped).
name: freellmapi

services:
  freellmapi:
    build: .
    image: freellmapi-local:patched
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Novosibirsk
      FREELLMAPI_REPO_ROOT: /freellmapi-repo
      HOME: /home/node
    ports:
      - "127.0.0.1:${PORT:-3012}:${PORT:-3012}"
    volumes:
      - freellmapi-data:/app/server/data
      # Репозиторий патчей — git push из UI (/api/git-push → push-to-git.sh)
      - .:/freellmapi-repo:rw
      - ${HOME}/.gitconfig:/home/node/.gitconfig:ro
      - ${HOME}/.git-credentials:/home/node/.git-credentials:ro
      # Локальные патчи (не в образе — не затираются при docker compose pull)
      - ./patch/index.js:/app/server/dist/index.js:ro
      - ./patch/lib/db-preinit.js:/app/server/dist/lib/db-preinit.js:ro
      - ./patch/proxy.js:/app/server/dist/routes/proxy.js:ro
      - ./patch/app.js:/app/server/dist/app.js:ro
      - ./patch/services/router.js:/app/server/dist/services/router.js:ro
      - ./patch/lib/request-detail-log.js:/app/server/dist/lib/request-detail-log.js:ro
      - ./patch/lib/custom-router.js:/app/server/dist/lib/custom-router.js:ro
      - ./patch/lib/log-range.js:/app/server/dist/lib/log-range.js:ro
      - ./patch/lib/provider-keys.js:/app/server/dist/lib/provider-keys.js:ro
      - ./patch/lib/router-status.js:/app/server/dist/lib/router-status.js:ro
      - ./patch/lib/reasoning-normalize.js:/app/server/dist/lib/reasoning-normalize.js:ro
      - ./patch/providers/openai-compat.js:/app/server/dist/providers/openai-compat.js:ro
      - ./patch/routes/request-detail-log.js:/app/server/dist/routes/request-detail-log.js:ro
      - ./patch/routes/responses.js:/app/server/dist/routes/responses.js:ro
      - ./patch/routes/router-settings.js:/app/server/dist/routes/router-settings.js:ro
      - ./patch/routes/git-push.js:/app/server/dist/routes/git-push.js:ro
      - ./patch/lib/git-pusher.js:/app/server/dist/lib/git-pusher.js:ro
      - ./patch/public/analytics.html:/app/server/dist/public/analytics.html:ro
      - ./patch/public/settings.html:/app/server/dist/public/settings.html:ro
      - ./patch/public/local-nav.js:/app/server/dist/public/local-nav.js:ro
      - ./patch/public/git-push.js:/app/server/dist/public/git-push.js:ro
      - ./patch/client/freellmapi-nav.js:/app/client/dist/freellmapi-nav.js:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||'3012';fetch('http://127.0.0.1:'+p+'/api/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  freellmapi-data:
    external: true
    name: freellmapi_freellmapi-data
