# LiteLLM → FreeLLMAPI (http://host.docker.internal:3012/v1)
# Anthropic-имена для Claude Code (/v1/messages → chat/completions).
model_list:
  - model_name: auto
    litellm_params:
      model: openai/auto
      api_base: http://host.docker.internal:3012/v1
      api_key: os.environ/FREELLMAPI_KEY
      use_chat_completions_api: true

  - model_name: freellm-auto
    litellm_params:
      model: openai/auto
      api_base: http://host.docker.internal:3012/v1
      api_key: os.environ/FREELLMAPI_KEY
      use_chat_completions_api: true

  - model_name: claude-sonnet-4
    litellm_params:
      model: openai/auto
      api_base: http://host.docker.internal:3012/v1
      api_key: os.environ/FREELLMAPI_KEY
      use_chat_completions_api: true

  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: openai/auto
      api_base: http://host.docker.internal:3012/v1
      api_key: os.environ/FREELLMAPI_KEY
      use_chat_completions_api: true

  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      model: openai/auto
      api_base: http://host.docker.internal:3012/v1
      api_key: os.environ/FREELLMAPI_KEY
      use_chat_completions_api: true

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
